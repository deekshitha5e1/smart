services:
  - type: static
    name: hosp-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: hosp-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: hosp-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
